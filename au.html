<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Panel</title>

<style>

/* CSS KAMU BIARIN SEMUA DI SINI */
/* JANGAN DIHAPUS */

</style>

</head>
<body>

<!-- COOLDOWN -->
<div class="cooldown-bar"
id="cooldownBar">

⏳ Sedang cooldown tunggu 200 detik

</div>

<!-- LOGIN -->
<div id="loginPage">

<div class="login-box">

<div class="login-title">
OWNER AKSES
</div>

<div class="login-sub">
Masuk ke dashboard
</div>

<input id="username"
placeholder="Username">

<input id="password"
type="password"
placeholder="Password">

<button class="login-btn"
onclick="login()">

➡ MASUK

</button>

</div>

</div>

<!-- HOME -->
<div id="home">

<div class="topbar">

<div class="user">

<div class="avatar"
id="avatar">

🙂

</div>

<div>

<div class="user-name"
id="userName">

USER

</div>

<div class="user-role"
id="userRole">

SYSTEM ACCESS

</div>

</div>

</div>

</div>

<!-- VIDEO -->
<div class="video-wrap">

<div class="video-banner">

<video id="ownerVideo"
autoplay
muted
loop
playsinline>

<source src="Owner.mp4"
type="video/mp4">

</video>

<div class="video-shadow"></div>

</div>

</div>

<div class="card">

<div class="title">
⚡ FITUR OWNER
</div>

<div class="tab-wrap">

<div class="tab active"
id="tabNomor"
onclick="setTab('nomor')">

📱 BUG NOMOR

</div>

<div class="tab"
id="tabGroup"
onclick="setTab('group')">

👥 BUG GROUP

</div>

</div>

<div class="input-box active"
id="nomorBox">

<input
id="targetNumber"
placeholder="812xxxxxxxx">

</div>

<div class="input-box"
id="groupBox">

<input
id="groupLink"
placeholder="Contoh: https://chat.whatsapp.com/AbCdEfGhIjKlMnOp">

</div>

<div class="menu">

<div>
🐞 [ DELAY INVISIBLE ]
</div>

<div>
›
</div>

</div>

<div class="mode-wrap">

<div class="mode"
id="globalMode"
onclick="setSender('global')">

🌐 GLOBAL

</div>

<div class="mode active"
id="privateMode"
onclick="setSender('private')">

🟣 PRIVATE

</div>

</div>

<div class="sender-status offline"
id="senderStatus">

🔴 Sender sedang offline

</div>

<button class="exec-btn"
onclick="executePanel()">

🚀 EXECUTE SYSTEM

</button>

<div class="console"
id="console">

<div class="console-content"
id="consoleContent">

</div>

</div>

<div class="result"
id="result"></div>

</div>

</div>

<!-- POPUP -->
<div class="popup"
id="popup">

<div class="popup-box">

<div class="popup-icon">
⚠️
</div>

<div class="popup-title">
Akses Ditolak
</div>

<div class="popup-desc">
Fitur ini hanya untuk OWNER ACCESS
</div>

<button class="popup-btn"
onclick="closePopup()">

OK

</button>

</div>

</div>

<!-- JS OBFUSCATE -->
<script src="enc.js"></script>

</body>
</html>
