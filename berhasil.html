for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2,s:0.5});
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="red";
p.forEach(a=>{

ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
